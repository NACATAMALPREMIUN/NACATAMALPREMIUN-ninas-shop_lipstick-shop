<!DOCTYPE html> 
<html lang="es"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Iniciar Sesión | Niñas Shop</title> 
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="login.css"> 
</head> 
<body class="login-page"> 
    <div class="login-container"> 
        <div class="back-link"> 
            <a href="index.html">← Volver a la Tienda</a> 
        </div> 
        <div class="login-box"> 
            <img class="logo-login" src="imagines/logo1-removebg-preview.png" alt="Logo de Niñas Shop"> 
            <h2 id="form-title">Accede a tu cuenta</h2> 
            
            <form class="login-form" id="login-form" action="#" method="post"> 
                <div class="input-group"> 
                    <label for="email">Correo Electrónico</label> 
                    <input type="email" id="email" name="email" required placeholder="tu.correo@ejemplo.com" aria-label="Correo Electrónico"> 
                </div> 
                <div class="input-group"> 
                    <label for="password">Contraseña</label> 
                    <input type="password" id="password" name="password" required placeholder="••••••••" aria-label="Contraseña"> 
                </div> 
                <button type="submit" class="btn-1 btn-login">Iniciar Sesión</button> 
            </form> 
            
            <form class="login-form" id="register-form" action="#" method="post"> 
                <div class="input-group"> 
                    <label for="reg-user">Nombre de Usuario (Para la cuenta)</label> 
                    <input type="text" id="reg-user" name="user" required placeholder="Ej: GallardoPRO777"> 
                </div> 

                <div class="form-row">
                    <div class="input-group col-flex"> 
                        <label for="reg-name">1er Nombre</label> 
                        <input type="text" id="reg-name" required placeholder="Sofia"> 
                    </div> 
                    <div class="input-group col-flex"> 
                        <label for="reg-name2">2do Nombre</label> 
                        <input type="text" id="reg-name2" placeholder="Opcional"> 
                    </div> 
                    <div class="input-group col-flex"> 
                        <label for="reg-name3">3er Nombre</label> 
                        <input type="text" id="reg-name3" placeholder="Opcional"> 
                    </div> 
                </div>

                <div class="form-row">
                    <div class="input-group col-flex"> 
                        <label for="reg-lastname">1er Apellido</label> 
                        <input type="text" id="reg-lastname" required placeholder="Gallardo"> 
                    </div> 
                    <div class="input-group col-flex"> 
                        <label for="reg-lastname2">2do Apellido</label> 
                        <input type="text" id="reg-lastname2" placeholder="Opcional"> 
                    </div> 
                </div>

                <div class="input-group"> 
                    <label for="reg-phone">Teléfono (Opcional)</label> 
                    <input type="tel" id="reg-phone" name="phone" placeholder="Ej: 12345678"> 
                </div> 
                <div class="input-group"> 
                    <label for="reg-address">Dirección de Envío (Opcional)</label> 
                    <input type="text" id="reg-address" name="address" placeholder="Ej: Colegio público 14 de septiembre"> 
                </div> 

                <div class="input-group"> 
                    <label for="reg-email">Correo Electrónico</label> 
                    <input type="email" id="reg-email" name="email" required placeholder="tu.correo@ejemplo.com"> 
                </div> 
                <div class="input-group"> 
                    <label for="reg-password">Crear Contraseña</label> 
                    <input type="password" id="reg-password" name="password" required placeholder="Mínimo 6 caracteres"> 
                </div> 
                <button type="submit" class="btn-1 btn-login btn-register">Crear Cuenta</button> 
            </form> 
            
            <p class="separator">o</p> 
            <button class="btn-2 btn-social">Continuar con Google</button> 
            <button class="btn-2 btn-social">Continuar con Facebook</button> 
            
            <div class="footer-links"> 
                <a href="olvide.html">¿Olvidaste tu contraseña?</a> 
                <p id="toggle-link"> ¿No tienes cuenta? <a href="#" id="show-register">Regístrate aquí</a> </p> 
            </div> 
        </div> 
    </div> 

    <script> 
        const URL_API = "http://localhost:5000/api"; 
        
        document.addEventListener('DOMContentLoaded', () => { 
            const loginForm = document.getElementById('login-form'); 
            const registerForm = document.getElementById('register-form'); 
            const formTitle = document.getElementById('form-title'); 
            const toggleLinkContainer = document.getElementById('toggle-link'); 

            // --- VISTAS DINÁMICAS (INTERFAZ) --- 
            const showRegister = (e) => { 
                e.preventDefault(); 
                loginForm.style.display = 'none'; 
                registerForm.style.display = 'block'; 
                formTitle.textContent = 'Crea tu Cuenta'; 
                toggleLinkContainer.innerHTML = '¿Ya tienes cuenta? <a href="#" id="show-login">Iniciar Sesión</a>'; 
                document.getElementById('show-login').addEventListener('click', showLogin); 
            }; 

            const showLogin = (e) => { 
                if (e) e.preventDefault(); 
                registerForm.style.display = 'none'; 
                loginForm.style.display = 'block'; 
                formTitle.textContent = 'Accede a tu cuenta'; 
                toggleLinkContainer.innerHTML = '¿No tienes cuenta? <a href="#" id="show-register">Regístrate aquí</a>'; 
                document.getElementById('show-register').addEventListener('click', showRegister); 
            }; 

            document.getElementById('show-register').addEventListener('click', showRegister); 

            // --- ENVIAR DATOS AL SERVIDOR (PROCESOS) --- 
            
            // 1. Evento para Procesar el REGISTRO COMPLETO RELACIONAL
            registerForm.addEventListener('submit', (e) => { 
                e.preventDefault(); 
                
                const datosRegistro = { 
                    user: document.getElementById('reg-user').value.trim(), 
                    nombre: document.getElementById('reg-name').value.trim(), 
                    segundo_nombre: document.getElementById('reg-name2').value.trim(), 
                    tercer_nombre: document.getElementById('reg-name3').value.trim(), 
                    apellido: document.getElementById('reg-lastname').value.trim(), 
                    segundo_apellido: document.getElementById('reg-lastname2').value.trim(), 
                    telefono: document.getElementById('reg-phone').value.trim(), 
                    direccion: document.getElementById('reg-address').value.trim(), 
                    correo: document.getElementById('reg-email').value.trim(), 
                    password: document.getElementById('reg-password').value 
                }; 
                
                fetch(`${URL_API}/registro`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(datosRegistro) 
                }) 
                .then(res => res.json()) 
                .then(data => { 
                    if (data.error) {
                        alert(`Error: ${data.error}`);
                        return;
                    }
                    alert(data.mensaje || "¡Registro relacional completado con éxito! 🎉"); 
                    registerForm.reset(); 
                    showLogin(null); 
                }) 
                .catch(err => alert("Error de conexión con el servidor backend.")); 
            }); 

            // 2. Evento para Procesar el LOGIN con Mapeo de FK y LEFT JOIN
            loginForm.addEventListener('submit', (e) => { 
                e.preventDefault(); 
                const datosLogin = { 
                    correo: document.getElementById('email').value.trim(), 
                    password: document.getElementById('password').value 
                }; 
                
                fetch(`${URL_API}/login`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(datosLogin) 
                }) 
                .then(res => res.json()) 
                .then(data => { 
                    if (data.error) { 
                        alert(data.error); 
                        return; 
                    } 

                    localStorage.setItem('userRole', data.rol); 
                    localStorage.setItem('usuario', data.usuario); 
                    localStorage.setItem('id_cliente', data.id_cliente); 

                    alert(data.mensaje || "Inicio de sesión exitoso");

                    if (data.role === 'admin' || data.rol === 'admin') { 
                        window.location.href = "admin.html"; 
                    } else { 
                        window.location.href = "index.html"; 
                    } 
                }) 
                .catch(err => alert("Error de conexión con el servidor backend.")); 
            }); 
        }); 
    </script> 
</body> 
</html>
